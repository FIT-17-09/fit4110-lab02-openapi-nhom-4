openapi: 3.1.0
info:
  title: Smart Campus - Core Business API (Nhom 4)
  version: 1.0.0
  description: |
    Hop dong API cho Cap 2 (Core <-> AI Vision) va Cap 3 (Core <-> Access Gate).
    Consumer: Core Business (A6).
    Provider: AI Vision (A4) va Access Gate (A3).
  contact:
    name: Nhom 4 - FIT4110
    email: fit4110@example.edu.vn

servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder

tags:
  - name: health
    description: Kiem tra trang thai service
  - name: ai-vision
    description: Ket qua phan tich anh tu AI Vision (Cap 2)
  - name: access-gate
    description: Log quet the va trang thai cong (Cap 3)

security:
  - bearerAuth: []

paths:

  # ─── HEALTH ────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Kiem tra trang thai service
      description: Endpoint kiem tra service con hoat dong hay khong.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service dang hoat dong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: core-business
                    time: '2026-05-10T08:00:00Z'

  # ─── CAP 2: AI VISION ──────────────────────────────────────
  /analyses:
    get:
      operationId: listAnalyses
      summary: Lay danh sach ket qua phan tich anh
      description: Core goi AI Vision de lay danh sach ket qua phan tich anh/detect.
      tags: [ai-vision]
      parameters:
        - name: cameraId
          in: query
          required: false
          description: Loc theo camera
          schema:
            type: [string, 'null']
        - name: minConfidence
          in: query
          required: false
          description: Nguong confidence toi thieu (0.0 - 1.0)
          schema:
            type: [number, 'null']
            minimum: 0
            maximum: 1
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Danh sach ket qua phan tich
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnalysisResult'
                  total:
                    type: integer
              examples:
                withDetection:
                  value:
                    items:
                      - analysisId: "a001"
                        cameraId: "cam-01"
                        timestamp: "2026-05-10T08:00:00Z"
                        frameUrl: "https://storage.campus.local/frames/a001.jpg"
                        frameExpiredAt: "2026-05-11T08:00:00Z"
                        result:
                          detectionType: person
                          confidence: 0.95
                          boundingBox:
                            x: 100
                            y: 150
                            width: 80
                            height: 200
                          faceId: null
                    total: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /analyses/{analysisId}:
    get:
      operationId: getAnalysisById
      summary: Lay chi tiet mot ket qua phan tich
      description: Lay chi tiet ket qua phan tich anh theo analysisId.
      tags: [ai-vision]
      parameters:
        - name: analysisId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chi tiet ket qua phan tich
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
              examples:
                person:
                  value:
                    analysisId: "a001"
                    cameraId: "cam-01"
                    timestamp: "2026-05-10T08:00:00Z"
                    frameUrl: null
                    frameExpiredAt: "2026-05-10T09:00:00Z"
                    result:
                      detectionType: person
                      confidence: 0.91
                      boundingBox:
                        x: 50
                        y: 60
                        width: 90
                        height: 180
                      faceId: "face-xyz"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /detections/latest:
    get:
      operationId: getLatestDetections
      summary: Lay detect moi nhat theo loai doi tuong
      description: Core polling endpoint nay moi 5 giay de nhan detect moi nhat.
      tags: [ai-vision]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [person, vehicle, unknown]
        - name: minConfidence
          in: query
          required: false
          schema:
            type: [number, 'null']
            minimum: 0
            maximum: 1
      responses:
        '200':
          description: Danh sach detect moi nhat
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DetectionEvent'
              examples:
                vehicleDetected:
                  value:
                    - eventId: "e001"
                      cameraId: "cam-02"
                      detectedAt: "2026-05-10T08:05:00Z"
                      detectionType: vehicle
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── CAP 3: ACCESS GATE ────────────────────────────────────
  /access-logs:
    get:
      operationId: listAccessLogs
      summary: Lay log quet the
      description: Core lay log quet the tu Access Gate, loc theo gateId va khoang thoi gian.
      tags: [access-gate]
      parameters:
        - name: gateId
          in: query
          required: false
          schema:
            type: [string, 'null']
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Danh sach log quet the
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessLog'
                  total:
                    type: integer
              examples:
                withLogs:
                  value:
                    items:
                      - logId: "log-001"
                        gateId: "gate-01"
                        cardId: "a3f2b1c0d9e8f7a6b5c4d3e2f1a0b9c8"
                        timestamp: "2026-05-10T08:10:00Z"
                        note: null
                        result:
                          accessStatus: granted
                          userId: "user-123"
                          role: "student"
                    total: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access-logs/{logId}:
    get:
      operationId: getAccessLogById
      summary: Chi tiet mot log quet the
      description: Lay chi tiet mot ban ghi log quet the theo logId.
      tags: [access-gate]
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chi tiet log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLog'
              examples:
                denied:
                  value:
                    logId: "log-002"
                    gateId: "gate-02"
                    cardId: "b4e3c2d1e0f9a8b7c6d5e4f3a2b1c0d9"
                    timestamp: "2026-05-10T08:15:00Z"
                    note: "The bi tu choi lan 3"
                    result:
                      accessStatus: denied
                      reason: not_permitted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Kiem tra trang thai mot cong
      description: Kiem tra trang thai hien tai cua mot cong ra vao.
      tags: [access-gate]
      parameters:
        - name: gateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trang thai cong
          headers:
            Cache-Control:
              description: Cache toi da 10 giay
              schema:
                type: string
                example: max-age=10
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'
              examples:
                open:
                  value:
                    gateId: "gate-01"
                    state: open
                    updatedAt: "2026-05-10T08:00:00Z"
                    errorMessage: null
                error:
                  value:
                    gateId: "gate-02"
                    state: error
                    updatedAt: "2026-05-10T07:55:00Z"
                    errorMessage: "GATE_MECHANICAL_JAM"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: So item toi da moi trang (toi da 200).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      description: Vi tri bat dau lay du lieu.
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:

    # ── Health ────────────────────────────────────────────────
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          example: core-business
        time:
          type: string
          format: date-time
          example: '2026-05-10T08:00:00Z'

    # ── Cap 2: AI Vision ──────────────────────────────────────
    AnalysisResult:
      type: object
      additionalProperties: false
      required: [analysisId, cameraId, timestamp, result]
      properties:
        analysisId:
          type: string
        cameraId:
          type: string
        timestamp:
          type: string
          format: date-time
        frameUrl:
          type: [string, 'null']
          format: uri
          description: URL anh frame. Null neu da het han luu tru.
        frameExpiredAt:
          type: [string, 'null']
          format: date-time
          description: Thoi diem frame bi xoa. Null neu chua xoa.
        result:
          oneOf:
            - $ref: '#/components/schemas/PersonDetected'
            - $ref: '#/components/schemas/VehicleDetected'
            - $ref: '#/components/schemas/NoDetection'
          discriminator:
            propertyName: detectionType
            mapping:
              person: '#/components/schemas/PersonDetected'
              vehicle: '#/components/schemas/VehicleDetected'
              none: '#/components/schemas/NoDetection'

    PersonDetected:
      type: object
      additionalProperties: false
      required: [detectionType, confidence, boundingBox]
      properties:
        detectionType:
          type: string
          const: person
        confidence:
          type: number
          minimum: 0
          maximum: 1
        boundingBox:
          $ref: '#/components/schemas/BoundingBox'
        faceId:
          type: [string, 'null']
          description: ID khuon mat neu nhan dien duoc. Null neu khong nhan dien.

    VehicleDetected:
      type: object
      additionalProperties: false
      required: [detectionType, confidence]
      properties:
        detectionType:
          type: string
          const: vehicle
        confidence:
          type: number
          minimum: 0
          maximum: 1
        plateNumber:
          type: [string, 'null']
          description: Bien so xe neu doc duoc. Null neu khong ro.

    NoDetection:
      type: object
      additionalProperties: false
      required: [detectionType]
      properties:
        detectionType:
          type: string
          const: none
        reason:
          type: [string, 'null']
          description: Ly do khong phat hien duoc gi.

    BoundingBox:
      type: object
      additionalProperties: false
      required: [x, y, width, height]
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number

    DetectionEvent:
      type: object
      additionalProperties: false
      required: [eventId, cameraId, detectedAt, detectionType]
      properties:
        eventId:
          type: string
        cameraId:
          type: string
        detectedAt:
          type: string
          format: date-time
        detectionType:
          type: string
          enum: [person, vehicle, unknown]

    # ── Cap 3: Access Gate ────────────────────────────────────
    AccessLog:
      type: object
      additionalProperties: false
      required: [logId, gateId, cardId, timestamp, result]
      properties:
        logId:
          type: string
        gateId:
          type: string
        cardId:
          type: string
          description: SHA-256 hash cua so the. Khong phai so the goc.
        timestamp:
          type: string
          format: date-time
        note:
          type: [string, 'null']
          description: Ghi chu them. Null neu khong co.
        result:
          oneOf:
            - $ref: '#/components/schemas/AccessGranted'
            - $ref: '#/components/schemas/AccessDenied'
          discriminator:
            propertyName: accessStatus
            mapping:
              granted: '#/components/schemas/AccessGranted'
              denied: '#/components/schemas/AccessDenied'

    AccessGranted:
      type: object
      additionalProperties: false
      required: [accessStatus, userId]
      properties:
        accessStatus:
          type: string
          const: granted
        userId:
          type: string
        role:
          type: [string, 'null']
          description: Vai tro cua nguoi dung. Null neu chua phan loai.

    AccessDenied:
      type: object
      additionalProperties: false
      required: [accessStatus, reason]
      properties:
        accessStatus:
          type: string
          const: denied
        reason:
          type: string
          enum: [card_not_found, expired, not_permitted, gate_locked]

    GateStatus:
      type: object
      additionalProperties: false
      required: [gateId, state, updatedAt]
      properties:
        gateId:
          type: string
        state:
          type: string
          enum: [open, closed, locked, error]
        updatedAt:
          type: string
          format: date-time
        errorMessage:
          type: [string, 'null']
          description: Ma loi khi state=error. Null neu binh thuong.

    # ── Problem Details (RFC 7807) ────────────────────────────
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: 'https://campus.local/errors/validation'
        title:
          type: string
          example: Du lieu khong hop le
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: [string, 'null']
          maxLength: 500
          example: Field cardId khong dung dinh dang
        instance:
          type: [string, 'null']
          format: uri
          example: 'https://campus.local/access-logs'
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
                example: gateId
              code:
                type: string
                example: REQUIRED
              message:
                type: string
                example: gateId la bat buoc

  responses:
    BadRequest:
      description: Du lieu sai dinh dang
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: 'https://campus.local/errors/validation'
            title: Du lieu khong hop le
            status: 400
            detail: Payload khong dung JSON Schema
            instance: 'https://campus.local/access-logs'
            errors:
              - field: limit
                code: MAX_EXCEEDED
                message: limit toi da la 200

    Unauthorized:
      description: Thieu hoac sai thong tin xac thuc
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: 'https://campus.local/errors/unauthorized'
            title: Chua xac thuc
            status: 401
            detail: Thieu Bearer token
            instance: 'https://campus.local/analyses'
            errors: []

    Forbidden:
      description: Khong co quyen thuc hien thao tac
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource khong ton tai
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Loi khong mong muon phia server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'